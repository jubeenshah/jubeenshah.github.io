# Site settings — see README.md for the full post frontmatter schema.
title: Jubeen Shah
description: >-
  Security engineer. Poet. Curious being. Writing on security, projects,
  certifications, and everything in between.
url: "https://jubeenshah.github.io"
baseurl: ""
image: /assets/images/og-card.png

# Social
twitter:
  username: jubeenshah
  card: summary_large_image
twitter_username: jubeenshah
github_username: jubeenshah
linkedin_username: jubeen-shah

# Front matter defaults — every post gets the terminal layout automatically.
defaults:
  - scope:
      path: ""
    values:
      image:
        path: /assets/images/og-card.png
        height: 630
        width: 1200
        alt: Jubeen Shah Turbo Vision site preview
  - scope:
      path: ""
      type: posts
    values:
      layout: post-terminal

# Build settings
theme: minima
future: true
plugins:
  - jekyll-feed
  - jekyll-scholar

scholar:
  style: chicago-author-date
  locale: en
  source: ./_bibliography
  bibliography: references.bib
  sort_by: author
  order: ascending
  query: "@*"

exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
