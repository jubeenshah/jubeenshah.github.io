# Achievements rendered on the about page by _includes/achievements.html
# as a `tree ~/proof/` listing, and exported at /proof.json.
#
# Structure: a list of sections (dir: certs|badges|pins), each with groups.
# Group: key (shown as <dir>/<key>/), label (hover), color, unit (count noun,
#        default "badges"), items.
# Item:  name (chip text / hover), url (PUBLIC proof page — required),
#        image (optional artwork; omit for a text chip), desc (hover tooltip,
#        also exposed to text extraction and proof.json).
#
# Artwork sources that hotlink cleanly:
#   HTB:       og:image on the achievement page (academy.hackthebox.com/storage/badges/…)
#   Accredible/OffSec: api.accredible.com/v1/frontend/credential_website_embed_image/badge/<numeric-id>
#              (numeric id lives in the page's og:image meta, not the share UUID)
#   KC7:       badge page img (varies: azurefd / cloudinary / github raw)

