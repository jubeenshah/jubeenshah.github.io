# Achievement badges rendered on the about page by _includes/achievements.html.
#
# Each group:
#   key:   short name, shown as the proof/<key>/ directory
#   label: hover label for the group
#   color: accent colour for the group's chips/border
#   unit:  what the items are called in the count line (default: badges)
#
# Each item:
#   name:  badge/cert name (shown on hover, and as the chip text when no image)
#   url:   PUBLIC proof link — the page a visitor lands on to verify
#   image: optional badge artwork. Remote URL (HTB CDN works) or a local file
#          under /assets/images/badges/. Omit it and a text chip renders instead.
#   desc:  optional one-liner shown in the hover tooltip
#
# HTB tip: the badge page's og:image is hotlinkable, e.g.
#   https://academy.hackthebox.com/storage/badges/<slug>.png

