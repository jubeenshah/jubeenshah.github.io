---
layout: default
---
<article class="post terminal-page terminal-post cat-security">

  <header class="tp-header">
    <div class="tp-cmd">
      <span class="t-prompt">you@jubeen.sh:<span class="t-path">~</span>$</span>
      <span class="t-cmd-text">cat {{ page.title | downcase }}.md</span>
    </div>
  </header>

  <aside class="tp-toc" id="writing-toc">
    <div class="toc-header">// toc</div>
    <nav class="toc-nav" id="toc-nav"></nav>
  </aside>

  <div class="tp-progress cat-security" id="tp-progress">
    <div class="tp-progress-bar">
      <div class="tp-progress-fill" id="tp-progress-fill"></div>
    </div>
    <div class="tp-progress-heading" id="tp-progress-heading"></div>
  </div>

  <div class="tp-page-content tp-content">
    {{ content }}
  </div>

</article>

<link rel="stylesheet" href="{{ '/assets/post-terminal.css' | relative_url }}">
<script src="{{ '/assets/post-terminal.js' | relative_url }}"></script>
